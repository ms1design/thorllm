# =============================================================================
# thorllm patch registry
# Maps each patch to the vLLM version ranges it applies to.
#
# Format per patch:
#   description: human-readable summary
#   applies_to:
#     ">=X.Y.Z,<A.B.C": true   # apply for this range
#     ">=A.B.C":         false  # do NOT apply (upstream fixed it)
#   notes: optional explanation
# =============================================================================

patches:
  patch_sm110:
    description: "SM110 (Jetson Thor) CUTLASS NVFP4 capability-family fix + Conv3dLayer cuBLAS crash fix + modelopt cuBLAS contiguous fix + FP8 CUTLASS Error Internal fix"
    notes: >
      Four separate SM110 issues are addressed by this patch:

      (A) NVFP4 backend selection — mxfp4.py and the fused-MoE files use
      is_device_capability_family(100) which matches SM10.x (datacenter Blackwell)
      but NOT SM11.x (Thor). This patch adds SM110 to the NVFP4 code-path and
      excludes it from the broken Triton MXFP4 kernels (issue #29317 on vllm-project).
      In vLLM >=0.18.0, nvfp4_utils.py centralises linear GEMM selection and already
      uses has_device_capability(100) which covers SM110 — so the linear GEMM path
      works without patching. mxfp4.py and the MoE files still need patching.
      In flashinfer_fp4_moe.py >=0.18.0, only the CUTEDSL function still uses
      is_device_capability_family(100); the CUTLASS function already uses
      has_device_capability(100). The patch for that file is still correct.

      (B) Conv3dLayer cuBLAS crash — NEW in vLLM 0.18.0. The Qwen3-VL vision
      encoder PatchEmbed uses Conv3dLayer (model_executor/layers/conv.py). On SM110,
      CustomOp dispatches to forward_native() (SM110 not in compiled CUDA archs),
      which calls _forward_mulmat() → F.linear() → cuBLAS. On sm11.0a,
      cublasLtCreate fails (CUBLAS_STATUS_NOT_INITIALIZED). Fix: guard
      _forward_mulmat with a capability check and fall back to _forward_conv()
      (F.conv3d via cuDNN) on SM110. Also guards the torch-2.9.x branch in
      forward_cuda() for the same reason.

      (C) modelopt / CUBLAS_STATUS_INVALID_VALUE — vLLM 0.18.0 refactored
      FP8/Int8 kernel selection into kernels/linear/scaled_mm/cutlass.py.
      CutlassInt8ScaledMMLinearKernel.process_weights_after_loading stores the
      transposed weight as weight.t().data — a non-contiguous view with
      column-major strides (1, K). torch.inductor captures the strides and
      emits reinterpret_tensor(weight, (K, N), (1, K), 0). JetPack cuBLAS on
      SM110 rejects CUDA_R_16BF operands with that stride layout and returns
      CUBLAS_STATUS_INVALID_VALUE. Fix: change to weight.t().contiguous().data.
      Additionally, CutlassInt8ScaledMMLinearKernel.is_supported() returns True
      for any CUDA device; adding an SM110 guard makes it fall through to
      TritonInt8ScaledMMLinearKernel which works on SM11.x.

      (D) FP8 CUTLASS Error Internal — CutlassFP8ScaledMMLinearKernel.is_supported()
      also returns True unconditionally. The CUTLASS FP8 kernel targets only
      SM89/SM90/SM100; on SM11.x it raises RuntimeError: Error Internal at launch.
      Fix: same is_supported() guard as (C); SM110 falls through to
      PerTensorTorchFP8ScaledMMLinearKernel (torch._scaled_mm), which is safe.

      Note on anchor changes vs 0.18.0:
        - flashinfer_cutlass_moe.py: already includes SM110/SM120 upstream —
          patch 2 is a documented no-op.
        - flashinfer_cutedsl_moe.py and flashinfer_trtllm_moe.py: use a local
          alias `p = current_platform` so the correct anchor is
          `p.is_device_capability_family(100)`, not `current_platform.`.
        - flashinfer_fp4_moe.py: uses has_device_capability(100) which already
          covers SM110 — patch 5 is a documented no-op.
        - modelopt.py / fp8.py: flat dispatch removed in 0.18.0; patches 7/8
          for those files are retained as legacy no-ops for older vLLM.
    applies_to:
      ">=0.8.0,<99.0.0": true

  patch_mtp_nvfp4:
    description: "NVFP4 MTP speculative-decoding weight shape assertion fix"
    notes: >
      When a Qwen3.5-NVFP4 model is loaded with speculative decoding using
      method='mtp', vLLM builds a Qwen3_5MTPDraftModel from the same NVFP4
      checkpoint. The FP4-packed weight tensors in the checkpoint have a
      different shape than the parameter tensors allocated by the MTP draft
      head's ColumnParallelLinear initializer. The generic weight_loader_v2
      path calls load_column_parallel_weight which asserts:

          assert self.data.shape == loaded_weight.shape  # parameter.py:153

      The mismatch (packed inner dim vs expected full width) fires this
      assertion and aborts the engine.

      Two-file fix:
        (1) parameter.py — replace the bare assert with a shape-adaptive check:
            when numel matches, reshape loaded_weight to fit self.data; when
            numel genuinely differs, raise a descriptive AssertionError.
        (2) qwen3_5_mtp.py — belt-and-suspenders try/except around the
            weight_loader call in load_weights; retries with a reshape on
            AssertionError, re-raises only for true mismatches.

      From vLLM 0.18.0 the MTP weight loading path is unchanged upstream.
    applies_to:
      ">=0.18.0,<99.0.0": true

  # patch_layernorm is temporarily disabled — does not work reliably.
  # Symptom: RMSNormGated missing 'activation' attribute in vLLM < 0.16.0.
  # Re-enable once root cause confirmed on target vLLM version.
  patch_layernorm:
    description: "RMSNormGated missing activation attribute fix"
    notes: >
      In vLLM <0.16.0, RMSNormGated.__init__ does not accept or store the
      'activation' parameter, causing AttributeError when loading NVFP4 gated
      models. From 0.16.0 onwards the attribute is already present upstream
      and this patch must NOT be applied (would cause duplicate-argument error).
    applies_to:
      ">=0.8.0,<0.16.0": true
      ">=0.16.0":         false